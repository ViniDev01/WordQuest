<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Teste Seu Inglês</title>
</head>
<body>

    <header class="header-home">
        <button class="btn-add" id="btn-add">+ add palavra</button>
    </header>

    <main class="main-home">
        <section class="section-home">
            <h1 class="title" id="title">0  Palavras para aprender</h1>
            <button class="btn-start">
                <a href="quest.html" id="link">Iniciar</a>
            </button>
        </section>
    </main>

    <div class="model-add" id="model-add">
        <form class="form-add" id="model-filho">
            <h3>Adicione a palavrar que você quer aprender</h3>
            <input type="text" name="english" placeholder="Digite sua palavra em inglês..." required>
            <input type="text" name="portugues" placeholder="Digite sua palavra em português..." required>
            <button type="submit">Adicionar</button>
        </form>
    </div>
    
</body>

<script src="js/home.js"></script>
</html>
